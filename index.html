<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="doc-title">Happy Monthsary, My Love! 💖</title>

    <!-- Google Fonts for Clean & Crisp Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Great+Vibes&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Open Graph Tags para SURE na ENVELOPE ang Lalabas sa Messenger -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="May Espesyal Na Liham Para Sa'yo 💌">
    <meta property="og:description" content="I-tap para buksan ang sobre at basahin ang mensahe.">
    <meta property="og:image" content="https://img.freepik.com/free-vector/opened-envelope-with-red-heart-card-vector-illustration_1017-48866.jpg">
    <meta property="og:image:type" content="image/jpeg">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: #1a0510;
            font-family: 'Poppins', sans-serif;
        }

        .viewport-wrapper {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            perspective: 1500px;
        }

        .stage {
            position: relative;
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ---------------- ENVELOPE DESIGN ---------------- */
        .envelope-container {
            position: relative;
            width: 320px;
            height: 220px;
            background: #6b1129;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 15px rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .envelope-container::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px dashed #d4af37;
            border-radius: 6px;
            pointer-events: none;
        }

        /* Flaps */
        .flap-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 125px solid #821733;
            transform-origin: top;
            transition: transform 0.8s ease-in-out, z-index 0.6s ease;
            z-index: 4;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        .pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid #540c1f;
            border-right: 160px solid #540c1f;
            border-bottom: 115px solid #631026;
            border-radius: 0 0 10px 10px;
            z-index: 3;
        }

        .wax-seal {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            background: radial-gradient(circle at 30% 30%, #f3e0aa, #b8860b);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            z-index: 5;
            transition: opacity 0.4s ease;
        }

        .hint-text {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            font-size: 12px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ---------------- BRIGHT & CLEAR CARD DESIGN (VERTICAL) ---------------- */
        .card {
            position: absolute;
            width: 290px;
            height: 190px;
            background: #ffffff;
            border-radius: 12px;
            top: 15px;
            left: 15px;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            border: 2px solid #d4af37;
            opacity: 0;
        }

        .card-top {
            width: 100%;
            background: #fdfbf7;
            padding: 20px 20px 10px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px dashed #e0d0b0;
        }

        .card-top img {
            max-width: 100%;
            max-height: 280px;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            border: 4px solid #ffffff;
        }

        .card-bottom {
            width: 100%;
            padding: 20px 25px 25px 25px;
            background: #ffffff;
            text-align: center;
        }

        .card-bottom h2 {
            font-family: 'Great Vibes', cursive;
            color: #8b1331;
            font-size: 38px;
            margin-bottom: 2px;
            font-weight: normal;
        }

        .card-bottom h4 {
            font-family: 'Cinzel', serif;
            color: #b8860b;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 18px;
            font-weight: 700;
        }

        .card-bottom p {
            color: #2b2b2b;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-line;
            font-weight: 400;
        }

        /* ---------------- OPEN STATE ANIMATION ---------------- */
        .stage.open .flap-top {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .stage.open .wax-seal {
            opacity: 0;
            pointer-events: none;
        }

        .stage.open .envelope-container {
            transform: translateY(280px) scale(0.8);
            opacity: 0.15;
            pointer-events: none;
        }

        .stage.open .card {
            position: relative;
            top: 0;
            left: 0;
            width: 100%;
            max-width: 440px;
            height: auto;
            z-index: 20;
            opacity: 1;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }

        .stage.open .hint-text {
            display: none;
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="stage" id="mainStage" onclick="toggleEnvelope()">
            <div class="envelope-container">
                <div class="flap-top"></div>
                <div class="wax-seal">💖</div>
                <div class="pocket"></div>
                
                <!-- Card Inside Envelope (Top Picture, Bottom Message) -->
                <div class="card">
                    <div class="card-top">
                        <img id="card-img" src="my-photo.jpg" alt="Shared Photo">
                    </div>
                    
                    <div class="card-bottom">
                        <h2 id="card-title"></h2>
                        <h4 id="card-subtitle"></h4>
                        <p id="card-message"></p>
                    </div>
                </div>

                <div class="hint-text">(I-tap para buksan ang sobre)</div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            title: "Happy Monthsary, My Love!",
            subtitle: "TO MY FAVORITE PERSON ✨",
            message: `Ang bilis ng panahon, pero bawat segundong kasama kita ay walang katumbas na kaligayahan.

Salamat sa pag-unawa, sa pagpapasensya, at sa walang sawang pagmamahal na ibinibigay mo araw-araw.

Ikaw ang aking pahinga at aking paboritong destinasyon. Looking forward sa marami pang buwan at alaala kasama ka. I love you so much! 💖`
        };

        // Data Binding
        document.getElementById('card-title').textContent = CONFIG.title;
        document.getElementById('card-subtitle').textContent = CONFIG.subtitle;
        document.getElementById('card-message').textContent = CONFIG.message;
        document.getElementById('doc-title').textContent = CONFIG.title;

        function toggleEnvelope() {
            document.getElementById('mainStage').classList.toggle('open');
        }
    </script>

</body>
</html>
